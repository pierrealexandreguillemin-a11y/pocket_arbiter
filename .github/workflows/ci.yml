name: CI - Pocket Arbiter (ISO Strict)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint + Type Check + Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install xenon

      - name: Ruff lint
        run: python -m ruff check scripts/

      - name: Ruff format check
        run: python -m ruff format --check scripts/

      - name: Mypy type check
        run: python -m mypy scripts/ --ignore-missing-imports

      - name: Run tests with coverage
        run: python -m pytest scripts/iso/ scripts/pipeline/tests/ -m "not slow" --cov --cov-fail-under=60 -q

      - name: Cyclomatic complexity (ISO 25010)
        run: xenon scripts/ -b B -m B -a B
